name: One-time Xijiang three-sales copy update

on:
  push:
    paths:
      - .github/workflows/one-time-xijiang-three-sales-copy.yml

permissions:
  contents: write

jobs:
  update-copy:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Emphasize network amplification strategy
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('xijiang-xunmei/index.html')
          text = path.read_text(encoding='utf-8')
          original = text

          title = '三销：栈道空间有限，网络空间无限'
          body = '以栈道为舞台，以苗寨为背景，通过短视频全网种草，打造西江必到目的地；联合乡村主播常态直播，将特色文创产品全天候推向全国市场，实现线下体验制造内容、网络传播放大影响、直播电商持续成交。'

          pattern = re.compile(
              r'(<div class="principle[^\"]*">\s*<div class="n">P-03</div>\s*<h3>).*?(</h3>\s*<p>).*?(</p>\s*</div>)',
              re.S,
          )
          text, count = pattern.subn(r'\1' + title + r'\2' + body + r'\3', text, count=1)

          if count != 1:
              raise SystemExit(f'Expected exactly one P-03 principle card, found {count}.')
          if text == original:
              raise SystemExit('No content changed.')

          path.write_text(text, encoding='utf-8')
          PY

      - name: Verify copy
        run: |
          grep -F '三销：栈道空间有限，网络空间无限' xijiang-xunmei/index.html
          grep -F '线下体验制造内容、网络传播放大影响、直播电商持续成交' xijiang-xunmei/index.html

      - name: Commit copy-only change and remove workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/one-time-xijiang-three-sales-copy.yml
          git add xijiang-xunmei/index.html
          git commit -m "docs: emphasize Xijiang network amplification strategy"
          git push
