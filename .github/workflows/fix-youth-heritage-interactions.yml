name: Fix youth heritage interactions

on:
  issue_comment:
    types: [created]

permissions:
  contents: write

jobs:
  fix-and-validate:
    if: github.event.issue.pull_request && github.event.comment.body == '/run-youth-heritage-fix'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Patch click layering and sharing metadata
        run: |
          python3 - <<'PY'
          from pathlib import Path
          from html.parser import HTMLParser
          import struct

          path = Path('youth-heritage-100/index.html')
          text = path.read_text(encoding='utf-8')

          replacements = [
              ('.hero:after{content:"100";', '.hero:after{pointer-events:none;content:"100";'),
              ('.actions{display:flex;', '.actions{position:relative;z-index:2;display:flex;'),
              ('.btn{padding:', '.btn{position:relative;z-index:1;padding:'),
          ]
          for old, new in replacements:
              if old in text:
                  text = text.replace(old, new, 1)
              elif new not in text:
                  raise SystemExit(f'Expected CSS rule not found: {old}')

          image = 'https://enxpower.com/youth-heritage-100/og-image.png'
          marker = f'<meta property="og:image" content="{image}">'
          metadata = f'''<meta property="og:image" content="{image}">
<meta property="og:image:secure_url" content="{image}">
<meta property="og:image:type" content="image/png">
<meta property="og:image:width" content="300">
<meta property="og:image:height" content="300">
<meta property="og:image:alt" content="青年非遗100全国非遗创新赋能项目">
<meta itemprop="image" content="{image}">
<link rel="image_src" href="{image}">'''
          if 'og:image:width' not in text:
              if marker not in text:
                  raise SystemExit('og:image marker not found')
              text = text.replace(marker, metadata, 1)

          class Checker(HTMLParser):
              def __init__(self):
                  super().__init__(); self.ids=set(); self.hrefs=[]
              def handle_starttag(self, tag, attrs):
                  d=dict(attrs)
                  if d.get('id'): self.ids.add(d['id'])
                  href=d.get('href','')
                  if href.startswith('#') and len(href)>1: self.hrefs.append(href[1:])
          c=Checker(); c.feed(text)
          missing=sorted(set(c.hrefs)-c.ids)
          if missing: raise SystemExit(f'Missing anchor targets: {missing}')

          png=Path('youth-heritage-100/og-image.png').read_bytes()
          if png[:8] != b'\x89PNG\r\n\x1a\n': raise SystemExit('Invalid PNG signature')
          width,height=struct.unpack('>II',png[16:24])
          if (width,height)!=(300,300): raise SystemExit(f'Unexpected image dimensions: {width}x{height}')

          path.write_text(text,encoding='utf-8')
          print('anchors=',sorted(set(c.hrefs)))
          print('share_image=',width,height,len(png))
          PY
      - name: Commit verified fix and remove workflow
        run: |
          rm .github/workflows/fix-youth-heritage-interactions.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add youth-heritage-100/index.html .github/workflows/fix-youth-heritage-interactions.yml
          git commit -m "fix hero button click layer and validate share metadata"
          git push origin main
