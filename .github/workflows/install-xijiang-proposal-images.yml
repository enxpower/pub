name: Install Xijiang Proposal Images
on:
  push:
    paths:
      - '.github/workflows/install-xijiang-proposal-images.yml'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add original PPT images to proposals
        run: |
          python - <<'PY'
          from pathlib import Path
          p=Path('xijiang-xunmei/index.html')
          s=p.read_text(encoding='utf-8')
          tag='<script src="proposal-images.js?v=20260718-3"></script>'
          if tag not in s:
              s=s.replace('</body>',tag+'</body>')
              p.write_text(s,encoding='utf-8')
          PY
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add xijiang-xunmei/index.html
          git diff --cached --quiet || git commit -m "Show original PPT imagery in ten store proposals"
          git push
