name: Export Xijiang PDF

on:
  push:
    paths:
      - '.github/workflows/export-xijiang-pdf.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright@1.52.0
          npx playwright install --with-deps chromium
      - name: Export PDF
        run: |
          cat > export-pdf.mjs <<'EOF'
          import { chromium } from 'playwright';
          const browser = await chromium.launch({headless:true});
          const page = await browser.newPage({viewport:{width:1440,height:1000}, deviceScaleFactor:1});
          await page.goto('https://enxpower.com/xijiang-xunmei/?pdf=1', {waitUntil:'networkidle', timeout:120000});
          await page.emulateMedia({media:'screen'});
          await page.addStyleTag({content:`
            @page { size: A4 portrait; margin: 8mm; }
            .navbox { position:absolute !important; }
            .reveal { opacity:1 !important; transform:none !important; }
            .hero { min-height: 281mm !important; break-after: page; }
            .section, .cta, footer { break-inside:auto; }
            .statement,.vision-art,.principle,.map,.stop,.pc,.exp,.ops,.finance-copy,.srow,.phase,.gov-card { break-inside:avoid; }
            .menu { display:none !important; }
            .links { display:flex !important; }
            html,body { overflow:visible !important; }
          `});
          await page.pdf({
            path:'xijiang-xunmei/西江千户苗寨寻美栈道-世界级商业运营总体方案.pdf',
            format:'A4',
            printBackground:true,
            preferCSSPageSize:true,
            displayHeaderFooter:false,
            margin:{top:'0',right:'0',bottom:'0',left:'0'},
            scale:0.78
          });
          await browser.close();
          EOF
          node export-pdf.mjs
      - name: Commit PDF
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add xijiang-xunmei/*.pdf
          git commit -m 'Export Xijiang master plan PDF' || exit 0
          git push
