name: Update Xijiang social preview
on:
  push:
    branches: [main]
    paths:
      - 'xijiang-xunmei/og-image.jpg'
      - '.github/workflows/update-xijiang-preview.yml'
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update metadata and hero image
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('xijiang-xunmei/index.html')
          s = p.read_text(encoding='utf-8')
          s = s.replace('og-image.svg', 'og-image.jpg')
          marker = '<meta property="og:type" content="website">'
          enriched = marker + '<meta property="og:url" content="https://enxpower.com/xijiang-xunmei/"><meta property="og:image:type" content="image/jpeg"><meta property="og:image:width" content="1200"><meta property="og:image:height" content="630"><meta property="og:image:alt" content="西江千户苗寨寻美栈道世界级商业运营总体方案">'
          if 'og:image:width' not in s:
              s = s.replace(marker, enriched)
          p.write_text(s, encoding='utf-8')
          PY
      - name: Commit changes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add xijiang-xunmei/index.html
          git diff --cached --quiet || git commit -m 'Update Xijiang social preview metadata'
          git push
