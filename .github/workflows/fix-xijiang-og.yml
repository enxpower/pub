name: Fix Xijiang OG metadata

on:
  push:
    paths:
      - '.github/workflows/fix-xijiang-og.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Replace relative social image URLs
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('xijiang-xunmei/index.html')
          s = p.read_text(encoding='utf-8')
          img = 'https://enxpower.com/xijiang-xunmei/og-image.jpg?v=20260718'
          s = s.replace('<meta property="og:image" content="og-image.jpg">', f'<meta property="og:image" content="{img}"><meta property="og:image:secure_url" content="{img}">')
          s = s.replace('<meta name="twitter:image" content="og-image.jpg">', f'<meta name="twitter:image" content="{img}">')
          p.write_text(s, encoding='utf-8')
          PY
      - name: Commit metadata fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add xijiang-xunmei/index.html
          git diff --cached --quiet || git commit -m "Use absolute cache-busted Xijiang social image URL"
          git push
