name: One-time Xijiang editorial polish

on:
  push:
    paths:
      - .github/workflows/one-time-xijiang-editorial-polish.yml

permissions:
  contents: write

jobs:
  polish-copy:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply client-facing editorial polish
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(text, old, new, label):
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{label}: expected 1 match, found {count}: {old}')
              return text.replace(old, new, 1)

          index_path = Path('xijiang-xunmei/index.html')
          proposal_path = Path('xijiang-xunmei/proposal-images.js')
          index = index_path.read_text(encoding='utf-8')
          proposal = proposal_path.read_text(encoding='utf-8')

          index_replacements = [
              (
                  '以栈道为舞台，以苗寨为背景，通过短视频全网种草，打造西江必到目的地；联合乡村主播常态直播，将特色文创产品全天候推向全国市场，实现线下体验制造内容、网络传播放大影响、直播电商持续成交。',
                  '以栈道为舞台、以苗寨为背景，通过短视频全网种草，强化“西江必到”的目的地认知；联合乡村主播与内容创作者开展常态化直播，将特色文创产品全天候推向全国市场，形成“线下体验生产内容、网络传播放大影响、直播电商持续成交”的增长闭环。',
                  'network amplification copy',
              ),
              ('54㎡旗舰文创聚落，承担品牌总店与爆款首发。', '54㎡旗舰文创空间，承担品牌总店、限定首发与内容发布功能。', 'store 03 route summary'),
              ('全景窗口，贵州冠军咖啡，日咖夜酒，提升高峰与夜游客单。', '全景窗口、贵州冠军咖啡与日咖夜酒，提升高峰时段与夜游场景的消费价值。', 'store 05 route summary'),
              ('统一视觉识别、门店命名、包装语言、导视系统与内容日历，形成清晰的“MIAO不可言”公众品牌。', '统一视觉识别、门店命名、包装语言、导视系统与内容日历，建立清晰统一的“MIAO不可言”公众品牌体系。', 'brand system copy'),
              ('建立SKU分级、供应商准入、质量追溯、知识产权、库存调拨与爆款补货机制。', '建立SKU分级、供应商准入、质量追溯、知识产权、库存调拨与畅销品补货机制。', 'supply chain copy'),
              ('围绕迎宾、讲解、出品、卫生、安全、投诉与极端天气建立可培训、可检查的SOP。', '围绕迎宾、讲解、出品、卫生、安全、投诉与极端天气，建立可培训、可执行、可检查的标准作业流程（SOP）。', 'service standard copy'),
              ('首年经营采用分阶段爬坡模型。原方案1840万元目标作为成熟期挑战值，实际预算按开业时间、有效客流、天气、淡旺季、店铺产能与线上收入拆解，并设置月度滚动修正。', '首年经营采用分阶段爬坡模型。1840万元作为成熟期挑战目标，实际预算根据开业时间、有效客流、天气、淡旺季、店铺产能与线上收入逐项拆解，并按月滚动校准。', 'financial intro'),
              ('规划口径：目标情景沿用原方案成熟期收入目标；审慎与基础情景用于开业爬坡和敏感性管理。正式投资决策前，以现场客流计数、停留时长、淡旺季结构、租赁条件和供应链报价完成复核。', '测算口径：目标情景对应成熟期收入目标；审慎与基础情景用于开业爬坡与敏感性管理。正式投资决策前，应结合现场客流计数、停留时长、淡旺季结构、租赁条件与供应链报价完成复核。', 'financial note'),
              ('内容种子投放', '首轮内容投放', 'implementation phase copy'),
              ('邀请非遗传承人、苗学专家、村民代表和商业顾问参与内容审议，确保文化表达准确、社区收益可见。', '邀请非遗传承人、苗学专家、村民代表与商业顾问参与内容审议，确保文化表达准确，并让社区收益得到切实体现。', 'governance copy'),
              ('寻美栈道将成为西江千户苗寨景观体验、文化传播、文创消费、非遗活化与社区共益的新载体，为贵州文创旅游目的地建设贡献一条可感知、可运营、可持续的示范路径。', '寻美栈道将成为西江千户苗寨景观体验、文化传播、文创消费、非遗活化与社区共益的新载体，为贵州文旅目的地建设提供一条可感知、可运营、可持续的示范路径。', 'closing statement'),
              ('WORLD-CLASS COMMERCIAL OPERATING MASTER PLAN', 'CULTURAL & CREATIVE COMMERCIAL OPERATING MASTER PLAN', 'footer English title'),
              ('规划展示版 · 2026', '总体方案 · 2026', 'footer edition label'),
          ]

          proposal_replacements = [
              ('游客刚进入栈道，最先出现的是体力、天气和拍照准备需求。这个点位需要用低决策门槛商品快速完成首购，并建立“寻美栈道”的第一处记忆。', '游客刚进入栈道时，首先面临体力补给、天气应对与拍照准备等需求。该点位应以易于即时购买的商品促成首次消费，并建立对“寻美栈道”的第一重记忆。', 'store 01 demand'),
              ('游客完成第一段登高后需要短暂停留、恢复体力和安静观景。小体量空间不适合复杂菜单，适合用少量高识别产品承接情绪消费。', '游客完成第一段登高后，需要短暂停留、恢复体力并安静观景。小体量空间不宜配置复杂菜单，更适合以少量高辨识度产品承接休憩与观景需求。', 'store 02 demand'),
              ('栈道中段需要一个强记忆、强传播的情绪空间。苗族神话、种子和祈福意象能把咖啡消费升级为可讲述的沉浸体验。', '栈道中段需要一处兼具鲜明记忆点与传播力的沉浸空间。苗族神话、种子与祈福意象，能够将咖啡消费转化为可参与、可讲述的文化体验。', 'store 04 demand'),
              ('游客对“苗家草本”和地方生活方式有好奇，但需要以日常饮品和伴手礼方式理解，避免医疗化表达。', '游客对“苗家草本”和地方生活方式充满好奇，需要通过日常饮品与伴手礼建立直观认知，并避免医疗化表达。', 'store 06 demand'),
              ('年轻游客需要更轻、更时尚、更适合拍照和日常使用的苗族美学商品，而不是传统纪念品。', '年轻游客期待更轻盈、更时尚，也更适合拍照与日常使用的苗族美学商品，而非传统纪念品。', 'store 09 demand'),
              ('终点需要把整条栈道体验收束成一次可坐下来的风景消费，轻餐、慢酒和夜景能自然延长停留。', '终点需要将整条栈道体验收束为一段可以坐下来慢慢感受的风景消费，轻餐、慢酒与夜景能够自然延长停留。', 'store 10 demand'),
              ('用景观和安静氛围形成溢价，在小面积中完成高质量茶歇转化。', '以景观与静谧氛围形成价值感，在有限面积内提供高品质茶歇体验并实现稳定消费。', 'store 02 value'),
              ('成为全线品牌旗舰、爆款首发地和高客单文创消费中心。', '成为全线品牌旗舰、限定首发地与高价值文创消费中心。', 'store 03 value'),
              ('依靠景观溢价和夜间消费提高客单，延长游客在高点停留时间。', '依托景观价值与夜间消费提升整体消费贡献，并延长游客在高点的停留时间。', 'store 05 value'),
              ('把在地知识转化为高频茶饮和可复购伴手礼。', '将本地草本知识转化为日常茶饮与可复购的伴手礼。', 'store 06 value'),
              ('提升非遗活化、社区收益、体验转化和内容生产能力。', '提升非遗活化水平、社区收益、游客参与度与内容生产能力。', 'store 07 value'),
              ('连接雷山蜂产业，形成轻体量、高复购的特色零售节点。', '连接雷山蜂产业，形成小体量、可复购的特色零售节点。', 'store 08 value'),
              ('连接年轻客群、时尚传播、高毛利配饰和可持续叙事。', '连接年轻客群、时尚传播、高价值配饰与可持续叙事。', 'store 09 value'),
              ('以餐饮客单和夜游延时完成全线商业叙事闭环。', '以餐饮消费与夜游停留完成全线商业叙事闭环。', 'store 10 value'),
              ('优先保证出品速度、天气应急商品和小额文创陈列效率，把它作为全线客流转化的起点。', '优先保障出品速度、天气应急商品与轻量文创的陈列和选购效率，将其打造为全线客流转化的起点。', 'store 01 strategy'),
              ('控制SKU数量，以预制度高、视觉稳定的茶饮和点心为主，减少后场压力。', '控制SKU数量，以标准化程度高、出品稳定、视觉呈现统一的茶饮与点心为主，降低后场运营压力。', 'store 02 strategy'),
              ('按“入门小件、核心限定、高客单联名、线上复购”组织货架，让空间同时服务现场销售和内容电商。', '按“入门小件、核心限定、高价值联名、线上复购”组织货架，使空间同时服务现场销售与内容电商。', 'store 03 strategy'),
              ('用少量强主题产品和稳定灯光氛围建立传播点，避免过重装置影响运营维护。', '以少量主题鲜明的产品和稳定的灯光氛围建立传播记忆点，避免过重装置增加运营维护负担。', 'store 04 strategy'),
              ('把窗口座位、外摆秩序、饮品出片率和夜间灯光作为核心运营指标。', '将窗口座位、外摆秩序、饮品视觉呈现与夜间灯光效果作为核心运营指标。', 'store 05 strategy'),
              ('建立合规的产品命名和话术体系，优先选择稳定、易标准化的草本饮品。', '建立合规的产品命名、内容表达与服务说明体系，优先选择品质稳定、易于标准化的草本饮品。', 'store 06 strategy'),
              ('采用预约体验加即买小件的组合，确保小面积空间也能稳定承接参与和销售。', '将预约体验与即购型小件相结合，确保小面积空间也能稳定承接游客参与与商品销售。', 'store 07 strategy'),
              ('以标准化小包装和组合礼盒提高连带率，用试吃试饮降低购买门槛。', '通过标准化小包装与组合礼盒提升组合购买率，并以试吃试饮降低购买门槛。', 'store 08 strategy'),
              ('控制菜单复杂度，强化本地食材和夜间氛围，让终点成为可复购的慢停留空间。', '控制菜单复杂度，强化本地食材与夜间氛围，让终点成为值得再次到访的慢生活空间。', 'store 10 strategy'),
              ("'苗家唯美茶点'", "'苗家精致茶点'", 'store 02 product'),
              ("'贵州茶、苗医药、苗寨零食'", "'贵州茶、苗族草本产品、苗寨零食'", 'store 03 product'),
              ("'暗黑系限定包装'", "'暗色主题限定包装'", 'store 04 product'),
              ("'自拍杆与滤镜'", "'手机摄影配件与滤镜'", 'store 01 product'),
              ('面向苗寨设置最佳全景座席', '面向苗寨设置核心全景座席', 'store 05 feature'),
              ('以高品质主理人联名提升空间调性', '与优质主理人开展联名合作，提升空间调性', 'store 05 feature'),
              ('制作过程本身成为内容和销售场景', '让制作过程本身成为可观看、可参与、可传播的内容场景', 'store 07 feature'),
              ('${esc(store.name)}策划主视觉', '${esc(store.name)}空间概念主图', 'hero alt text'),
              ('${esc(store.name)}策划参考图片 ${imageIndex + 1}', '${esc(store.name)}空间与产品概念图 ${imageIndex + 1}', 'gallery alt text'),
          ]

          for old, new, label in index_replacements:
              index = replace_once(index, old, new, label)
          for old, new, label in proposal_replacements:
              proposal = replace_once(proposal, old, new, label)

          index_path.write_text(index, encoding='utf-8')
          proposal_path.write_text(proposal, encoding='utf-8')
          PY

      - name: Verify removal of internal or defective wording
        run: |
          ! grep -E '原方案|规划展示版|WORLD-CLASS COMMERCIAL OPERATING MASTER PLAN|爆款|客单|内容种子投放' xijiang-xunmei/index.html xijiang-xunmei/proposal-images.js
          ! grep -E '低决策门槛|情绪消费|预制度高|出片率|话术体系|即买小件|连带率|高毛利配饰|夜游延时|策划参考图片|策划主视觉' xijiang-xunmei/proposal-images.js
          grep -F 'CULTURAL & CREATIVE COMMERCIAL OPERATING MASTER PLAN' xijiang-xunmei/index.html
          grep -F '总体方案 · 2026' xijiang-xunmei/index.html
          grep -F '线下体验生产内容、网络传播放大影响、直播电商持续成交' xijiang-xunmei/index.html
          grep -F '空间与产品概念图' xijiang-xunmei/proposal-images.js

      - name: Syntax checks
        run: |
          node --check xijiang-xunmei/proposal-images.js
          python - <<'PY'
          from pathlib import Path
          from html.parser import HTMLParser
          class P(HTMLParser): pass
          P().feed(Path('xijiang-xunmei/index.html').read_text(encoding='utf-8'))
          PY

      - name: Commit final copy polish and remove temporary audit files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/one-time-xijiang-editorial-polish.yml
          git rm xijiang-xunmei/_copy-audit.txt
          git add xijiang-xunmei/index.html xijiang-xunmei/proposal-images.js
          git commit -m "docs: complete Xijiang client-facing editorial polish"
          git push
