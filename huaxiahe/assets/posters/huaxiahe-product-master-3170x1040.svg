    </svg><text x="288" y="172" font-family="'Noto Serif SC','Songti SC','STSong',serif" font-size="34" font-weight="500" letter-spacing="6" fill="#614A25">华夏和</text><text x="160" y="345" font-family="'Noto Serif SC','Songti SC','STSong',serif" font-size="122" font-weight="500" letter-spacing="6" fill="#614A25">合香珠</text><text x="160" y="404" font-family="'Noto Serif SC','Songti SC','STSong',serif" font-size="36" font-weight="400" letter-spacing="2" fill="#7A6238">众香和，方成香。</text><line x1="160" y1="438" x2="260" y2="438" stroke="#614A25" stroke-width="3"/><text x="160" y="500" font-family="'Noto Serif SC','Songti SC','STSong',serif" font-size="27" font-weight="300" letter-spacing="0.5" fill="#453C30">合香珠，不是由单一木料雕成的普通珠串。</text><text x="160" y="548" font-family="'Noto Serif SC','Songti SC','STSong',serif" font-size="27" font-weight="300" letter-spacing="0.5" fill="#453C30">木、花、本草与天然芳香材料，</text><text x="160" y="596" font-family="'Noto Serif SC','Songti SC','STSong',serif" font-size="27" font-weight="300" letter-spacing="0.5" fill="#453C30">经配伍、研磨、和泥、成珠与缓慢养藏，</text><text x="160" y="644" font-family="'Noto Serif SC','Songti SC','STSong',serif" font-size="27" font-weight="300" letter-spacing="0.5" fill="#453C30">最终成为一件可以贴身佩戴的香气之物。</text><g transform="translate(2259,90)" clip-path="url(#clipMaterial)"><image href="../images/materials/master-poster-material.jpg" x="0" y="0" width="140" height="140" preserveAspectRatio="xMidYMid slice"/></g><text x="2429" y="130" font-family="'Noto Serif SC','Songti SC','STSong',serif" font-size="30" font-weight="500" letter-spacing="4" fill="#614A25">材料</text><line x1="2429" y1="146" x2="2479" y2="146" stroke="#9A7F4E" stroke-width="2"/><text x="2429" y="184" font-family="'Noto Serif SC','Songti SC','STSong',serif" font-size="21" font-weight="300" letter-spacing="1" fill="#453C30">木 · 花 · 脂 · 草 · 时间</text><g transform="translate(2259,370)" clip-path="url(#clipMaterial)"><image href="../images/process/master-poster-craft.jpg" x="0" y="0" width="140" height="140" preserveAspectRatio="xMidYMid slice"/></g><text x="2429" y="410" font-family="'Noto Serif SC','Songti SC','STSong',serif" font-size="30" font-weight="500" letter-spacing="4" fill="#614A25">工艺</text><line x1="2429" y1="426" x2="2479" y2="426" stroke="#9A7F4E" stroke-width="2"/><text x="2429" y="464" font-family="'Noto Serif SC','Songti SC','STSong',serif" font-size="21" font-weight="300" letter-spacing="1" fill="#453C30">选材 · 炮制 · 研磨 · 配伍 · 和泥</text><text x="2429" y="496" font-family="'Noto Serif SC','Songti SC','STSong',serif" font-size="21" font-weight="300" letter-spacing="1" fill="#453C30">醒泥 · 成珠 · 阴干 · 养藏</text><g transform="translate(2259,650)" clip-path="url(#clipMaterial)"><image href="../images/product/master-poster-wearing.jpg" x="0" y="0" width="140" height="140" preserveAspectRatio="xMidYMid slice"/></g><text x="2429" y="690" font-family="'Noto Serif SC','Songti SC','STSong',serif" font-size="30" font-weight="500" letter-spacing="4" fill="#614A25">佩用</text><line x1="2429" y1="706" x2="2479" y2="706" stroke="#9A7F4E" stroke-width="2"/><text x="2429" y="744" font-family="'Noto Serif SC','Songti SC','STSong',serif" font-size="21" font-weight="300" letter-spacing="1" fill="#453C30">一枚珠，一段时间。</text><text x="2429" y="776" font-family="'Noto Serif SC','Songti SC','STSong',serif" font-size="21" font-weight="300" letter-spacing="1" fill="#453C30">握在掌心，贴身而行。</text>
</svg>